services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: auth-api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://auth.pior.ca}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://auth.pior.ca}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - household_private

networks:
  household_private:
    external: true
    name: ${SHARED_DOCKER_NETWORK:-household_private}
