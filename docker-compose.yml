services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: auth-api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://auth.ts.szarans.ca}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://auth.ts.szarans.ca}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      pior_data:
      pior_edge:
        aliases:
          - auth-api

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-}
      secrets:
        - npm_token
    container_name: auth-web
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      pior_edge:
        aliases:
          - auth-web

networks:
  pior_data:
    external: true
    name: ${DATA_NETWORK:-pior_data}
  pior_edge:
    external: true
    name: pior_edge

secrets:
  npm_token:
    environment: NODE_AUTH_TOKEN
