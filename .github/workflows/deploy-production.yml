name: Deploy Auth Production

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: auth-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull and deploy Auth
    environment: PRODUCTION
    runs-on:
      - self-hosted
      - linux
      - service-auth
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.production.yml
      AUTH_DATABASE_URL_FILE: ${{ vars.AUTH_DATABASE_URL_FILE || '/opt/docker/pior-labs/secrets/service-auth/database-url' }}
      DATA_NETWORK: ${{ vars.DATA_NETWORK || 'pior_data' }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
        working-directory: /opt/docker/service-auth

    steps:
      - name: Validate runner prerequisites
        run: |
          set -euo pipefail
          test -d .git || {
            echo "/opt/docker/service-auth is not a Git checkout"
            exit 1
          }
          command -v docker >/dev/null
          command -v curl >/dev/null
          docker compose version

      - name: Update production checkout
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "Tracked files in the production checkout have local changes."
            git status --short
            exit 1
          fi
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Write production environment
        env:
          AUTH_ENV: ${{ secrets.AUTH_ENV }}
        run: |
          set -euo pipefail
          if [ -z "${AUTH_ENV:-}" ]; then
            echo "Missing required production secret: AUTH_ENV"
            exit 1
          fi

          printf '%s\n' "$AUTH_ENV" > .env
          sed -i \
            -e '/^DATABASE_URL=/d' \
            -e '/^DATABASE_URL_FILE=/d' \
            -e '/^AUTH_DATABASE_URL_FILE=/d' \
            -e '/^SHARED_DOCKER_NETWORK=/d' \
            -e '/^DATA_NETWORK=/d' \
            -e '/^COMPOSE_FILE=/d' \
            .env

          {
            printf '\n'
            printf 'COMPOSE_FILE=%s\n' "$COMPOSE_FILE"
            printf 'AUTH_DATABASE_URL_FILE=%s\n' "$AUTH_DATABASE_URL_FILE"
            printf 'DATA_NETWORK=%s\n' "$DATA_NETWORK"
          } >> .env
          chmod 600 .env

      - name: Validate production configuration
        run: |
          set -euo pipefail

          docker network inspect "$DATA_NETWORK" >/dev/null || {
            echo "Required platform data network does not exist: $DATA_NETWORK"
            exit 1
          }
          docker network inspect pior_edge >/dev/null || {
            echo "Required platform edge network does not exist: pior_edge"
            exit 1
          }

          docker compose config --quiet

      - name: Build Auth images
        run: docker compose build

      - name: Validate database secret mount
        run: |
          docker compose run --rm --no-deps api node -e '
            const { readFileSync } = require("node:fs");
            const path = process.env.DATABASE_URL_FILE;
            if (!path) throw new Error("DATABASE_URL_FILE is not configured");
            const value = readFileSync(path, "utf8").trim();
            if (!value.startsWith("postgresql://") && !value.startsWith("postgres://")) {
              throw new Error("Mounted database secret is not a PostgreSQL URL");
            }
            console.log("Auth database secret is mounted.");
          '

      - name: Apply database migration
        run: docker compose run --rm api node dist/scripts/migrate.js

      - name: Start Auth services
        run: docker compose up -d --remove-orphans

      - name: Wait for Auth API health
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/health; then
              echo
              exit 0
            fi
            sleep 2
          done

          echo "Auth API did not become healthy."
          docker compose ps
          docker compose logs --tail=100 api
          exit 1

      - name: Verify Auth through platform Caddy
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H 'Host: auth.szarans.ca' \
            http://127.0.0.1:8088/health
          echo

          curl --fail --silent --show-error --output /dev/null \
            -H 'Host: auth.szarans.ca' \
            http://127.0.0.1:8088/sign-in

          curl --fail --silent --show-error --output /dev/null \
            -H 'Host: auth.ts.szarans.ca' \
            http://127.0.0.1:8088/sign-in

      - name: Show running services
        run: docker compose ps
