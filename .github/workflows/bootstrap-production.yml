name: Bootstrap Auth Production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type bootstrap-auth to confirm the database bootstrap
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: auth-production-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap database and seed Auth
    runs-on:
      - self-hosted
      - linux
    defaults:
      run:
        shell: bash
        working-directory: /opt/docker/service-auth

    steps:
      - name: Require explicit confirmation
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirmation }}" != "bootstrap-auth" ]; then
            echo "Type bootstrap-auth when dispatching this workflow."
            exit 1
          fi

      - name: Validate runner prerequisites
        run: |
          set -euo pipefail
          test -d .git || {
            echo "/opt/docker/service-auth is not a Git checkout"
            exit 1
          }
          command -v docker >/dev/null
          command -v python3 >/dev/null
          docker compose version

      - name: Update production checkout
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "Tracked files in the production checkout have local changes."
            git status --short
            exit 1
          fi
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Write production environment
        env:
          AUTH_ENV: ${{ secrets.AUTH_ENV }}
        run: |
          set -euo pipefail
          if [ -z "${AUTH_ENV:-}" ]; then
            echo "Missing required repository secret: AUTH_ENV"
            exit 1
          fi
          printf '%s\n' "$AUTH_ENV" > .env
          chmod 600 .env

      - name: Validate external Docker networks
        run: |
          set -euo pipefail
          shared_network="$(grep -E '^SHARED_DOCKER_NETWORK=' .env | tail -n 1 | cut -d= -f2- || true)"
          shared_network="${shared_network:-household_private}"
          docker network inspect "$shared_network" >/dev/null || {
            echo "Required Postgres network does not exist: $shared_network"
            exit 1
          }
          docker network inspect pior_edge >/dev/null || {
            echo "Required platform edge network does not exist: pior_edge"
            exit 1
          }
          echo "SHARED_DOCKER_NETWORK=$shared_network" >> "$GITHUB_ENV"

      - name: Create or update Auth database and role
        env:
          POSTGRES_ADMIN_URL: ${{ secrets.POSTGRES_ADMIN_URL }}
        run: |
          set -euo pipefail
          if [ -z "${POSTGRES_ADMIN_URL:-}" ]; then
            echo "Missing required repository secret: POSTGRES_ADMIN_URL"
            exit 1
          fi

          database_url="$(grep -E '^DATABASE_URL=' .env | tail -n 1 | cut -d= -f2-)"
          if [ -z "$database_url" ]; then
            echo "DATABASE_URL is missing from AUTH_ENV"
            exit 1
          fi

          mapfile -t database_parts < <(
            DATABASE_URL="$database_url" python3 - <<'PY'
import os
from urllib.parse import unquote, urlparse

url = urlparse(os.environ["DATABASE_URL"])
if url.scheme not in {"postgres", "postgresql"}:
    raise SystemExit("DATABASE_URL must use postgres:// or postgresql://")
if not url.username or url.password is None or not url.path.lstrip("/"):
    raise SystemExit("DATABASE_URL must include a database user, password, and database name")

print(unquote(url.username))
print(unquote(url.password))
print(unquote(url.path.lstrip("/")))
PY
          )

          auth_db_user="${database_parts[0]}"
          auth_db_password="${database_parts[1]}"
          auth_db_name="${database_parts[2]}"
          echo "::add-mask::$auth_db_password"

          docker run --rm -i \
            --network "$SHARED_DOCKER_NETWORK" \
            -e POSTGRES_ADMIN_URL="$POSTGRES_ADMIN_URL" \
            -e AUTH_DB_USER="$auth_db_user" \
            -e AUTH_DB_PASSWORD="$auth_db_password" \
            -e AUTH_DB_NAME="$auth_db_name" \
            postgres:16-alpine \
            sh -euc 'psql "$POSTGRES_ADMIN_URL" \
              --set=ON_ERROR_STOP=1 \
              --set=auth_user="$AUTH_DB_USER" \
              --set=auth_password="$AUTH_DB_PASSWORD" \
              --set=auth_db="$AUTH_DB_NAME"' <<'SQL'
          SELECT format('CREATE ROLE %I LOGIN PASSWORD %L', :'auth_user', :'auth_password')
          WHERE NOT EXISTS (
            SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = :'auth_user'
          )
          \gexec

          SELECT format('ALTER ROLE %I WITH LOGIN PASSWORD %L', :'auth_user', :'auth_password')
          \gexec

          SELECT format('CREATE DATABASE %I OWNER %I', :'auth_db', :'auth_user')
          WHERE NOT EXISTS (
            SELECT 1 FROM pg_catalog.pg_database WHERE datname = :'auth_db'
          )
          \gexec

          SELECT format('ALTER DATABASE %I OWNER TO %I', :'auth_db', :'auth_user')
          \gexec
          SQL

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build Auth API image
        run: docker compose build api

      - name: Apply database migration
        run: docker compose run --rm api node dist/scripts/migrate.js

      - name: Seed users and OAuth clients
        run: docker compose run --rm api node dist/scripts/seed.js

      - name: Show bootstrap result
        run: |
          echo "Auth database bootstrap completed."
          echo "Run the Deploy Auth Production workflow to start the service."
